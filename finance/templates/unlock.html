{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bloom Finance — Unlock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/bloom.css' %}">
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">🔓</div>
  <div class="auth-title">Forgot your PIN?</div>
  <div class="auth-subtitle">Enter your backup passphrase to reset your PIN</div>

  {% if messages %}
    {% for message in messages %}
    <div style="background:#FEE8E8;color:#C0392B;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px;">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post" style="text-align:left">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Your Passphrase</label>
      <input type="text" name="passphrase" class="form-control" placeholder="e.g. purple butterfly garden" autofocus>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Verify & Reset PIN</button>
  </form>
  <a href="{% url 'pin_login' %}" style="font-size:12px;color:#B0A0C0;text-decoration:none;display:block;margin-top:16px;text-align:center">← Back to PIN login</a>
</div>
<script src="{% static 'js/bloom.js' %}"></script>
</body>
</html>
