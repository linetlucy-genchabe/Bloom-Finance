{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bloom Finance 🌸 — Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/bloom.css' %}">
</head>
<body class="auth-page">
<div class="auth-card" style="max-width:500px;text-align:left">
  <div style="text-align:center;margin-bottom:24px">
    <div class="auth-logo">🌸</div>
    <div class="auth-title">Welcome to Bloom Finance</div>
    <div class="auth-subtitle">Let's personalize your experience</div>
  </div>

  {% if messages %}
    {% for message in messages %}
    <div style="background:#FEE8E8;color:#C0392B;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:13px;">{{ message }}</div>
    {% endfor %}
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label class="form-label">Your Name</label>
      <input type="text" name="display_name" class="form-control" placeholder="e.g. Lynne" value="{{ profile.display_name }}" required>
    </div>

    <div class="form-group">
      <label class="form-label">Choose Your Avatar</label>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px">
        {% for emoji in "🌸🌺🌻🦋🌙⭐🎀💎🌈🦄" %}
        <button type="button" class="emoji-pick" data-target="avatar-input"
          style="font-size:24px;background:var(--lilac-light);border:2px solid transparent;border-radius:10px;padding:8px;cursor:pointer;transition:all .2s">{{ emoji }}</button>
        {% endfor %}
      </div>
      <input type="hidden" name="avatar" id="avatar-input" value="{{ profile.avatar_emoji|default:'🌸' }}">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Create PIN (4–6 digits)</label>
        <input type="password" name="pin" class="form-control" maxlength="6" pattern="[0-9]{4,6}" placeholder="••••••" inputmode="numeric" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm PIN</label>
        <input type="password" name="pin_confirm" class="form-control" maxlength="6" pattern="[0-9]{4,6}" placeholder="••••••" inputmode="numeric" required>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Backup Passphrase <span style="font-weight:400;text-transform:none;color:var(--text-light)">(optional but recommended)</span></label>
      <input type="text" name="passphrase" class="form-control" placeholder="e.g. purple butterfly garden">
      <div class="form-hint">Use this if you ever forget your PIN</div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Currency</label>
        <select name="currency" class="form-control">
          <option value="KES" {% if profile.currency == 'KES' %}selected{% endif %}>🇰🇪 KES</option>
          <option value="USD" {% if profile.currency == 'USD' %}selected{% endif %}>🇺🇸 USD</option>
          <option value="GBP" {% if profile.currency == 'GBP' %}selected{% endif %}>🇬🇧 GBP</option>
          <option value="EUR" {% if profile.currency == 'EUR' %}selected{% endif %}>🇪🇺 EUR</option>
        </select>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px">
      🌸 Start Blooming
    </button>
  </form>
</div>
<script src="{% static 'js/bloom.js' %}"></script>
</body>
</html>
